name: Deploy Supabase Edge Functions

# Despliega las Edge Functions a Supabase en cada push a main que toque
# supabase/functions o la config. Resuelve que Lovable despliega el frontend
# pero no las funciones cuando los cambios llegan por GitHub.
# También se puede correr a mano desde la pestaña Actions (workflow_dispatch).

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: opdclqitvxyqzeqzegih
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
