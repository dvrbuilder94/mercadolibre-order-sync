name: Deploy Supabase Edge Functions

# Deploy automático de las edge functions a tu propia Supabase.
#
# Requisitos (agregar en GitHub → Settings → Secrets and variables → Actions):
#   - SUPABASE_ACCESS_TOKEN : Supabase → Account → Access Tokens
#   - SUPABASE_PROJECT_REF  : el ref del proyecto (ej. abcdxyz...)
#
# Por ahora corre SOLO manualmente (workflow_dispatch) para no fallar en rojo
# antes de que existan los secrets / la Supabase propia. Una vez migrado y con
# los 2 secrets cargados, DESCOMENTA el bloque `push:` de abajo y cada push a
# main que toque supabase/functions/** desplegará solo.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/functions/**'
  #     - 'supabase/config.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "Faltan los secrets SUPABASE_ACCESS_TOKEN y/o SUPABASE_PROJECT_REF."
            echo "Agrégalos en Settings → Secrets → Actions y reintenta."
            exit 1
          fi
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
