name: Migrar backend a Supabase propio (schema + functions)

# Hace lo PESADO de la migración desde la nube (runners de GitHub), sin instalar
# nada en tu PC: aplica todas las migraciones (schema) y despliega todas las
# edge functions a tu proyecto Supabase nuevo.
#
# Uso (todo desde el navegador):
#   1. Crea tu proyecto en supabase.com y en Database → Extensions habilita
#      pg_cron y pg_net.
#   2. GitHub → Settings → Secrets and variables → Actions → agrega:
#        - SUPABASE_ACCESS_TOKEN  (Supabase → Account → Access Tokens)
#        - NEW_PROJECT_REF        (ref del proyecto nuevo)
#        - NEW_DB_PASSWORD        (la DB password que definiste al crear el proyecto)
#   3. GitHub → Actions → "Migrar backend…" → Run workflow.
#
# Idempotente: puedes re-correrlo. NO toca datos ni secrets de las functions
# (esos se cargan en el dashboard de Supabase).

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validar secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "${{ secrets.NEW_PROJECT_REF }}" ] || [ -z "${{ secrets.NEW_DB_PASSWORD }}" ]; then
            echo "Faltan secrets: SUPABASE_ACCESS_TOKEN, NEW_PROJECT_REF y/o NEW_DB_PASSWORD."
            exit 1
          fi

      - name: Link al proyecto nuevo
        run: supabase link --project-ref ${{ secrets.NEW_PROJECT_REF }} --password "${{ secrets.NEW_DB_PASSWORD }}"

      - name: Aplicar schema (todas las migraciones)
        run: supabase db push --password "${{ secrets.NEW_DB_PASSWORD }}"

      - name: Desplegar todas las edge functions
        run: supabase functions deploy --project-ref ${{ secrets.NEW_PROJECT_REF }}

      - name: Listo
        run: |
          echo "✅ Schema aplicado y funciones desplegadas en ${{ secrets.NEW_PROJECT_REF }}."
          echo "Siguiente: cargar secrets (MELI/Bsale) en el dashboard, re-crear cron, reconectar fuentes."
